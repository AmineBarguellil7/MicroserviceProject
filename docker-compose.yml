version: "3.8"
services:
  discovery:
    build: ../Eureka Server
    ports:
      - "8761:8761"
    image: "discovery-service"

  article:
    build: .
    environment:
      - eureka.client.serviceUrl.defaultZone=http://discovery:8761/eureka/
    ports:
      - "8020:8082"
    image: "article-app"

